# Render blueprint for Yadira (https://render.com/docs/blueprint-spec)
# Deploy: Render dashboard → New → Blueprint → pick this repo.
# All env vars are prompted in the dashboard on first deploy (sync: false);
# copy the values from your local .env. The VITE_FIREBASE_* vars are baked
# in at BUILD time but OPTIONAL — the production Firebase config is
# committed in src/lib/firebase.ts, so leave them blank unless you want to
# point a deploy at a different Firebase project.
services:
  - type: web
    name: yadira
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    healthCheckPath: /api/shared-mode
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false
      # Stripe billing for Yadira Premium ($5/week). sk_test_... to try it,
      # sk_live_... for real revenue. See STRIPE-SETUP.md.
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: INWORLD_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: VITE_FIREBASE_API_KEY
        sync: false
      - key: VITE_FIREBASE_AUTH_DOMAIN
        sync: false
      - key: VITE_FIREBASE_PROJECT_ID
        sync: false
      - key: VITE_FIREBASE_STORAGE_BUCKET
        sync: false
      - key: VITE_FIREBASE_MESSAGING_SENDER_ID
        sync: false
      - key: VITE_FIREBASE_APP_ID
        sync: false
