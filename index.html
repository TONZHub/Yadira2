<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/yadira-logo.png" />
    <!-- Splash animation: start fetching before the JS bundle parses so the
         logo draws from frame one instead of popping in mid-animation. -->
    <link rel="preload" as="image" href="/yadira-loading.gif" />
    <meta name="description" content="Yadira — an empathetic AI companion for people living with dementia, paired with a caregiver dashboard and clinical insight tracker." />
    <title>Yadira — Dementia Companion</title>
    <script>
      // Apply the large-font preference before first paint so the app never
      // flashes small text then jumps larger. Mirrors src/lib/fontScale.ts.
      try {
        if (localStorage.getItem('yadira_large_font') === '1') {
          document.documentElement.style.fontSize = '125%';
        }
      } catch (e) { /* storage blocked — default size */ }
    </script>
    <script>
      // First-ever visitors at the bare root see the landing page; any device
      // that has used Yadira before (a token exists) goes straight to the app,
      // so patients and caregivers never gain an extra step. Any query string
      // (e.g. /?start from the landing CTAs, or Stripe's ?premium_session
      // return) bypasses the redirect. Inline in <head> so it runs before the
      // bundle loads — no flash of the login screen.
      (function () {
        try {
          if (
            window.location.pathname === '/' &&
            window.location.search === '' &&
            !localStorage.getItem('yadira_token') &&
            !sessionStorage.getItem('yadira_session_role')
          ) {
            window.location.replace('/about');
          }
        } catch (e) { /* storage blocked — just load the app */ }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
